<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geography Foundation — PDF 1 Master Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  :root {
    --navy: #1A237E;
    --blue: #1565C0;
    --sky: #E3F2FD;
    --teal: #00695C;
    --teal-lt: #E0F2F1;
    --orange: #E65100;
    --orange-lt: #FFF3E0;
    --green: #2E7D32;
    --green-lt: #E8F5E9;
    --yellow: #F9A825;
    --yellow-lt: #FFFDE7;
    --red: #B71C1C;
    --red-lt: #FFEBEE;
    --purple: #4A148C;
    --purple-lt: #F3E5F5;
    --grey: #546E7A;
    --grey-lt: #ECEFF1;
    --bg: #0D1B2A;
    --card: #162032;
    --card2: #1E2D42;
    --text: #E8F0FE;
    --muted: #8BA3C7;
    --accent: #4FC3F7;
    --gold: #FFD54F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ───────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #0D1B2A 0%, #1A237E 60%, #0D47A1 100%);
    padding: 28px 24px 20px;
    text-align: center;
    border-bottom: 2px solid rgba(79,195,247,0.3);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '🗺';
    position: absolute;
    font-size: 120px;
    opacity: 0.06;
    top: -20px; left: -20px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .pdf-badge {
    display: inline-block;
    background: var(--yellow);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ── SCORE BAR ────────────────────────────────────── */
  .score-bar {
    background: var(--card);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(79,195,247,0.15);
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-item .val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .score-item .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .progress-wrap {
    flex: 1;
    min-width: 120px;
  }
  .progress-track {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  /* ── MODE SELECTOR ────────────────────────────────── */
  .mode-selector {
    padding: 16px 20px;
    background: var(--card2);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    border-bottom: 1px solid rgba(79,195,247,0.1);
  }
  .mode-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(79,195,247,0.2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* ── MAIN AREA ────────────────────────────────────── */
  .main { padding: 20px; max-width: 760px; margin: 0 auto; }

  /* ── QUESTION CARD ────────────────────────────────── */
  .q-card {
    background: var(--card);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--teal), var(--purple-lt));
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .q-tag {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tag-mcq    { background: #1565C0; color: #fff; }
  .tag-tf     { background: #4A148C; color: #fff; }
  .tag-fill   { background: #2E7D32; color: #fff; }
  .tag-match  { background: #E65100; color: #fff; }
  .tag-pyq    { background: #B71C1C; color: #fff; }
  .tag-source { background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid rgba(255,255,255,0.12); }

  .q-number {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 18px;
    font-weight: 400;
  }
  .q-text strong { color: var(--accent); }

  /* Statements block */
  .statements {
    background: rgba(79,195,247,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .statements p {
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
  }

  /* MCQ Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text);
  }
  .opt:hover { border-color: var(--accent); background: rgba(79,195,247,0.08); }
  .opt-key {
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    min-width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .opt.correct { background: rgba(46,125,50,0.25); border-color: #4CAF50; }
  .opt.wrong   { background: rgba(183,28,28,0.2);  border-color: #EF5350; }
  .opt.correct .opt-key { background: #4CAF50; color: #000; }
  .opt.wrong   .opt-key { background: #EF5350; color: #fff; }
  .opt.revealed { pointer-events: none; }

  /* Fill in blank */
  .fill-wrap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .fill-input {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(79,195,247,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    flex: 1;
    min-width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct { border-color: #4CAF50; background: rgba(46,125,50,0.15); }
  .fill-input.wrong   { border-color: #EF5350; background: rgba(183,28,28,0.1); }

  /* True/False */
  .tf-options { display: flex; gap: 12px; }
  .tf-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.2s;
    text-align: center;
  }
  .tf-btn:hover { border-color: var(--accent); }
  .tf-btn.correct { background: rgba(46,125,50,0.25); border-color: #4CAF50; color: #4CAF50; }
  .tf-btn.wrong   { background: rgba(183,28,28,0.2);  border-color: #EF5350; color: #EF5350; }

  /* Submit btn */
  .submit-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .submit-btn:hover { background: #81D4FA; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* Explanation Box */
  .explanation {
    display: none;
    margin-top: 14px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    animation: fadeUp 0.3s ease;
  }
  .explanation.show { display: block; }
  .explanation.correct-exp {
    background: rgba(46,125,50,0.12);
    border: 1px solid rgba(76,175,80,0.3);
  }
  .explanation.wrong-exp {
    background: rgba(183,28,28,0.1);
    border: 1px solid rgba(239,83,80,0.3);
  }
  .exp-head {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .exp-head.correct-head { color: #4CAF50; }
  .exp-head.wrong-head   { color: #EF5350; }
  .correct-ans {
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--accent);
  }
  .trick-box {
    background: rgba(249,168,37,0.1);
    border: 1px solid rgba(249,168,37,0.3);
    border-radius: 6px;
    padding: 8px 12px;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--gold);
  }

  /* ── NAV BUTTONS ──────────────────────────────────── */
  .nav-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(79,195,247,0.25);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .nav-btn:hover { background: rgba(79,195,247,0.12); transform: translateY(-1px); }
  .nav-btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .nav-btn.primary:hover { background: #81D4FA; }

  /* ── SECTION HEADER ───────────────────────────────── */
  .section-banner {
    background: linear-gradient(135deg, #1A237E, #0D47A1);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid rgba(79,195,247,0.2);
  }
  .section-icon { font-size: 28px; }
  .section-banner h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .section-banner p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ── RESULTS SCREEN ───────────────────────────────── */
  .results-screen {
    display: none;
    text-align: center;
    padding: 30px 20px;
  }
  .results-screen.show { display: block; }
  .big-score {
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
  }
  .grade-badge {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    padding: 8px 24px;
    border-radius: 30px;
    margin: 12px 0;
    letter-spacing: 2px;
  }
  .results-breakdown {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin: 16px auto;
    max-width: 500px;
    text-align: left;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
  }
  .breakdown-row:last-child { border-bottom: none; }

  /* ── FLASHCARD MODE ───────────────────────────────── */
  .flashcard {
    background: var(--card);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 16px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .flashcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--yellow), var(--orange), var(--red));
  }
  .flashcard:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,195,247,0.1); }
  .fc-front {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .fc-hint { font-size: 12px; color: var(--muted); }
  .fc-back { display: none; }
  .fc-back.show {
    display: block;
    animation: fadeUp 0.3s ease;
  }
  .fc-answer {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }
  .fc-trick {
    font-size: 12.5px;
    color: var(--gold);
    background: rgba(249,168,37,0.08);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 8px;
  }

  /* ── TOPIC SELECTOR ───────────────────────────────── */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .topic-chip {
    background: var(--card2);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 11.5px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--muted);
  }
  .topic-chip:hover, .topic-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,195,247,0.08);
  }
  .topic-chip .t-icon { font-size: 20px; display: block; margin-bottom: 4px; }

  /* Scrollable Q list for review */
  .review-list { max-height: 500px; overflow-y: auto; }
  .review-item {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border-left: 4px solid;
    font-size: 13px;
  }
  .review-item.correct { border-color: #4CAF50; }
  .review-item.wrong   { border-color: #EF5350; }
  .review-item.skipped { border-color: var(--grey); }

  /* Responsive */
  @media (max-width: 500px) {
    .q-text { font-size: 14px; }
    .score-item .val { font-size: 18px; }
    .header h1 { font-size: 17px; }
    .big-score { font-size: 54px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🗺 Geography Foundation — PDF 1 Test</h1>
  <p>Earth & Its Representation · Important Lines & Zones</p>
  <span class="pdf-badge">UPSC · BPSC · UPSC Mains GS-I</span>
</div>

<div class="score-bar">
  <div class="score-item">
    <div class="val" id="scoreVal">0</div>
    <div class="lbl">Score</div>
  </div>
  <div class="score-item">
    <div class="val" id="correctVal">0</div>
    <div class="lbl">Correct</div>
  </div>
  <div class="score-item">
    <div class="val" id="wrongVal">0</div>
    <div class="lbl">Wrong</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Q 0 of 0</div>
  </div>
  <div class="score-item">
    <div class="val" id="streakVal">🔥0</div>
    <div class="lbl">Streak</div>
  </div>
</div>

<div class="mode-selector">
  <button class="mode-btn active" onclick="setMode('mixed')">🎲 Mixed Test</button>
  <button class="mode-btn" onclick="setMode('mcq')">🔵 MCQ Only</button>
  <button class="mode-btn" onclick="setMode('fill')">✏️ Fill Blanks</button>
  <button class="mode-btn" onclick="setMode('tf')">✅ True/False</button>
  <button class="mode-btn" onclick="setMode('pyq')">📝 PYQs Only</button>
  <button class="mode-btn" onclick="setMode('flash')">⚡ Flashcards</button>
</div>

<div class="main" id="mainArea">
  <!-- Rendered by JS -->
</div>

<script>
// ═══════════════════════════════════════════════════
// QUESTION BANK — PDF 1
// ═══════════════════════════════════════════════════
const allQuestions = [

  // ── GLOBE ──────────────────────────────────────
  { id:1, topic:'Globe & Maps', type:'mcq', source:'Concept', isPYQ:false,
    q: 'Which of the following is the MOST accurate representation of the Earth?',
    opts:['A. Political Map','B. Topographic Map','C. Globe','D. Mercator Projection Map'],
    ans: 2,
    exp: 'A Globe is a 3D spherical model of Earth, preserving correct shape, size, direction, and distance — no distortion at all. Maps always involve some distortion because they flatten a curved surface.',
    trick:'Football = Globe (round 3D). Squashed football = Map (flat, distorted)!'
  },
  { id:2, topic:'Globe & Maps', type:'tf', source:'Concept', isPYQ:false,
    q: 'A map can show the whole Earth at once, but a globe can only show half the Earth at a time.',
    ans: true,
    exp: 'Correct! A globe is 3D — you can only see one hemisphere at a time. A flat map shows the entire Earth on one surface. However, the map has distortions while the globe does not.',
    trick:'Globe = football, Map = flat photo of the football — you see it all but it\'s distorted!'
  },
  { id:3, topic:'Globe & Maps', type:'fill', source:'Concept', isPYQ:false,
    q: 'A Globe is a ___-dimensional model of Earth, while a Map is ___-dimensional.',
    ans: '3, 2',
    alts:['three, two','3 2','3-dimensional, 2-dimensional'],
    exp: 'Globe = 3D (three-dimensional sphere). Map = 2D (two-dimensional flat surface). The 3D-to-2D conversion causes distortion in maps.',
    trick:'3D Globe → squash it flat → 2D Map (like SRK in Swades holding the globe!)'
  },

  // ── MAP SCALE ──────────────────────────────────
  { id:4, topic:'Globe & Maps', type:'mcq', source:'Concept', isPYQ:false,
    q: 'A map with scale 1:10,000 shows a _____ area with _____ detail compared to a 1:1,00,00,000 map.',
    opts:['A. Larger area, more detail','B. Smaller area, more detail','C. Larger area, less detail','D. Smaller area, less detail'],
    ans: 1,
    exp: 'Scale 1:10,000 = Large Scale Map = shows SMALL area in GREAT detail (like zooming into a city). Scale 1:1,00,00,000 = Small Scale Map = shows LARGE area (like entire India) but with less detail.',
    trick:'Instagram selfie = Large Scale (zoomed in, lots of detail of small area). Google Maps satellite = Small Scale (small details, huge area visible)!'
  },
  { id:5, topic:'Globe & Maps', type:'mcq', source:'Concept', isPYQ:false,
    q: 'Which type of map shows property boundaries and land ownership records?',
    opts:['A. Thematic Map','B. Cadastral Map','C. Political Map','D. Weather Map'],
    ans: 1,
    exp: 'Cadastral Maps show property boundaries and land ownership — used for revenue collection and land records. This is different from Political Maps (show country/state borders) or Thematic Maps (show specific topics like rainfall).',
    trick:'CADASTRAL = CADASTRE = Revenue record. Think: "CAD" = CADastre = Collector\'s land data!'
  },

  // ── MAP PROJECTIONS ────────────────────────────
  { id:6, topic:'Map Projections', type:'mcq', source:'UPSC Prelims 2016 (adapted)', isPYQ:true,
    q: 'Which map projection is most commonly used for depicting world maps in atlases?',
    opts:['A. Mercator Projection','B. Stereographic Projection','C. Robinson Projection','D. Lambert\'s Projection'],
    ans: 2,
    exp: 'Robinson Projection gives a visually balanced view of the world — it has slight distortion in both area and shape but looks natural. Mercator is used for NAVIGATION (ships, pilots), not for general world maps because it makes Greenland look as big as Africa!',

  { term:'INTERNATIONAL DATE LINE', ans:'~180° longitude through Pacific Ocean. Zigzags to avoid cutting island nations. Cross EAST = back 1 day. Cross WEST = forward 1 day.', trick:'Ranveer flies Mumbai → LA, crosses IDL east, it\'s YESTERDAY again! ⏰' },
  { term:'MERCATOR PROJECTION', ans:'Preserves shape/direction (angles). Distorts AREA badly. Greenland looks = Africa (14x smaller in reality). Used for navigation.', trick:'MERCATOR = MARINE = Navigation (ships & aircraft)!' },
  { term:'ROBINSON PROJECTION', ans:'Visual balance — slight distortion in both area and shape. Used for general world maps and atlases.', trick:'ROBINSON for Reference/Revision (atlases). Not for navigation!' },
  { term:'LARGE SCALE MAP', ans:'Scale like 1:10,000. Shows SMALL area in GREAT detail. City maps, cadastral maps.', trick:'Insta selfie = large scale (zoomed in, lots of face detail)!' },
  { term:'TORRID ZONE', ans:'Between Tropic of Cancer and Tropic of Capricorn (23.5°N to 23.5°S). Hot, high rainfall, no real seasons. Rainforests, mangroves.', trick:'TORRID = TOO HOT. Trapped between two tropics!' },
  { term:'4-MINUTE TIME RULE', ans:'Earth rotates 360° in 24 hours = 15° per hour = 1° per 4 minutes. Every 15° longitude = 1 hour time difference.', trick:'15° = 1 hour. So 82.5° ÷ 15 = 5.5 hours = IST!' },
];

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  resetTest();
  if (m === 'flash') renderFlashcard();
  else renderQuestion();
}

function resetTest() {
  let qs = [...allQuestions];
  if (state.mode === 'mcq') qs = qs.filter(q => q.type === 'mcq');
  else if (state.mode === 'fill') qs = qs.filter(q => q.type === 'fill');
  else if (state.mode === 'tf') qs = qs.filter(q => q.type === 'tf');
  else if (state.mode === 'pyq') qs = qs.filter(q => q.isPYQ);
  // Shuffle
  qs = qs.sort(() => Math.random() - 0.5);
  state.questions = qs;
  state.currentIndex = 0;
  state.score = 0; state.correct = 0; state.wrong = 0;
  state.streak = 0; state.maxStreak = 0;
  state.answered = {};
  state.flashIndex = 0; state.flashRevealed = false;
  updateScorebar();
}

// ══════════════════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════════════════
function renderQuestion() {
  const main = document.getElementById('mainArea');
  if (state.mode === 'flash') { renderFlashcard(); return; }

  if (state.currentIndex >= state.questions.length) {
    renderResults(); return;
  }

  const q = state.questions[state.currentIndex];
  const already = state.answered[q.id];

  let html = `
    <div class="section-banner">
      <div class="section-icon">📖</div>
      <div>
        <h2>${topicIcon(q.topic)} ${q.topic}</h2>
        <p>${state.currentIndex + 1} of ${state.questions.length} questions</p>
      </div>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-tag ${typeClass(q.type)}">${typeLabel(q.type)}</span>
        ${q.isPYQ ? '<span class="q-tag tag-pyq">📝 PYQ</span>' : ''}
        <span class="q-tag tag-source">${q.source}</span>
        <span class="q-number">Q${q.id}</span>
      </div>
      <div class="q-text">${formatQ(q.q)}</div>
  `;

  if (q.type === 'mcq') {
    html += `<div class="options" id="opts">`;
    q.opts.forEach((opt, i) => {
      let cls = '';
      if (already) {
        if (i === q.ans) cls = 'correct revealed';
        else if (i === already.userAns && !already.isCorrect) cls = 'wrong revealed';
        else cls = 'revealed';
      }
      html += `<div class="opt ${cls}" onclick="answerMCQ(${q.id}, ${i})">
        <span class="opt-key">${String.fromCharCode(65+i)}</span>
        <span>${opt.replace(/^[A-D]\.\s*/,'')}</span>
      </div>`;
    });
    html += `</div>`;
  } else if (q.type === 'tf') {
    const tfDone = already;
    html += `<div class="tf-options">
      <button class="tf-btn ${tfDone ? (true === q.ans ? 'correct' : already.userAns===true ? 'wrong':'') : ''}" 
        onclick="answerTF(${q.id}, true)">✅ TRUE</button>
      <button class="tf-btn ${tfDone ? (false === q.ans ? 'correct' : already.userAns===false ? 'wrong':'') : ''}" 
        onclick="answerTF(${q.id}, false)">❌ FALSE</button>
    </div>`;
  } else if (q.type === 'fill') {
    const fillDone = already;
    html += `<div class="fill-wrap">
      <input class="fill-input ${fillDone ? (fillDone.isCorrect?'correct':'wrong') : ''}" 
        type="text" id="fillInp" placeholder="Type your answer here..."
        value="${fillDone ? fillDone.userAns : ''}"
        ${fillDone ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')checkFill(${q.id})">
      <button class="submit-btn" onclick="checkFill(${q.id})" ${fillDone?'disabled':''}>Check →</button>
    </div>`;
  }

  // Explanation
  if (already) {
    const isC = already.isCorrect;
    html += `<div class="explanation ${isC?'correct-exp':'wrong-exp'} show">
      <div class="exp-head ${isC?'correct-head':'wrong-head'}">${isC?'✅ Correct!':'❌ Not quite...'}</div>
      <div>${q.exp}</div>
      ${!isC ? `<div class="correct-ans">✅ Correct Answer: <strong>${getCorrectAnsText(q)}</strong></div>` : ''}
      ${q.trick ? `<div class="trick-box">🎯 Memory Trick: ${q.trick}</div>` : ''}
    </div>`;
  }
  html += `</div>`;

  // Nav
  html += `<div class="nav-row">
    <button class="nav-btn" onclick="goQ(-1)" ${state.currentIndex===0?'disabled':''}>← Prev</button>
    <button class="nav-btn" onclick="resetTest(); renderQuestion()">🔄 Restart</button>
    <button class="nav-btn primary" onclick="goQ(1)">${state.currentIndex >= state.questions.length-1 ? '🏆 Results' : 'Next →'}</button>
  </div>`;

  main.innerHTML = html;
  updateScorebar();
}

function getCorrectAnsText(q) {
  if (q.type === 'mcq') return q.opts[q.ans];
  if (q.type === 'tf') return q.ans ? 'TRUE' : 'FALSE';
  if (q.type === 'fill') return q.ans;
  return '';
}

function formatQ(text) {
  return text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
}

function typeClass(t) {
  return {mcq:'tag-mcq',tf:'tag-tf',fill:'tag-fill',match:'tag-match'}[t]||'tag-mcq';
}
function typeLabel(t) {
  return {mcq:'MCQ',tf:'True/False',fill:'Fill in Blank',match:'Match'}[t]||t.toUpperCase();
}
function topicIcon(t) {
  const m = {'Globe & Maps':'🗺','Latitude':'📐','Longitude':'⏰','Equator & Hemispheres':'🌍',
    'Prime Meridian & GMT':'🕰','Important Lines':'📏','International Date Line':'📅',
    'Climate Zones':'🌡','Map Projections':'🖼','Mixed Concepts':'🎲'};
  return m[t]||'📍';
}

// ══════════════════════════════════════════════════════
// ANSWER HANDLERS
// ══════════════════════════════════════════════════════
function answerMCQ(qId, selected) {
  if (state.answered[qId]) return;
  const q = state.questions.find(x=>x.id===qId);
  const isC = selected === q.ans;
  recordAnswer(qId, selected, isC);
  renderQuestion();
}

function answerTF(qId, val) {
  if (state.answered[qId]) return;
  const q = state.questions.find(x=>x.id===qId);
  const isC = val === q.ans;
  recordAnswer(qId, val, isC);
  renderQuestion();
}

function checkFill(qId) {
  if (state.answered[qId]) return;
  const q = state.questions.find(x=>x.id===qId);
  const val = (document.getElementById('fillInp').value||'').trim().toLowerCase();
  const correct = q.ans.toLowerCase();
  const alts = (q.alts||[]).map(a=>a.toLowerCase());
  const isC = val === correct || alts.some(a => val.includes(a.split(',')[0]) || a.includes(val));
  recordAnswer(qId, val, isC);
  renderQuestion();
}

function recordAnswer(qId, userAns, isC) {
  state.answered[qId] = {userAns, isCorrect: isC};
  if (isC) {
    state.correct++;
    state.streak++;
    state.score += 10 + (state.streak > 2 ? 5 : 0);
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
  } else {
    state.wrong++;
    state.streak = 0;
    state.score = Math.max(0, state.score - 3);
  }
  updateScorebar();
}

function goQ(dir) {
  state.currentIndex = Math.max(0, Math.min(state.questions.length, state.currentIndex + dir));
  renderQuestion();
}

// ══════════════════════════════════════════════════════
// SCOREBAR
// ══════════════════════════════════════════════════════
function updateScorebar() {
  document.getElementById('scoreVal').textContent = state.score;
  document.getElementById('correctVal').textContent = state.correct;
  document.getElementById('wrongVal').textContent = state.wrong;
  const streak = state.streak;
  document.getElementById('streakVal').textContent = (streak>=3?'🔥':'') + streak;
  const total = state.questions.length || 1;
  const done = Object.keys(state.answered).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `Q ${state.currentIndex+1} of ${total} · ${pct}% done`;
}

// ══════════════════════════════════════════════════════
// RESULTS
// ══════════════════════════════════════════════════════
function renderResults() {
  const main = document.getElementById('mainArea');
  const total = state.questions.length;
  const pct = Math.round((state.correct/total)*100);
  let grade, color, emoji;
  if (pct>=90) { grade='MASTER'; color='#FFD700'; emoji='🏆'; }
  else if (pct>=70) { grade='READY'; color='#4CAF50'; emoji='✅'; }
  else if (pct>=50) { grade='NEEDS WORK'; color='#FF9800'; emoji='⚠️'; }
  else { grade='REVISE PDF 1'; color='#EF5350'; emoji='📚'; }

  main.innerHTML = `
    <div style="text-align:center; padding: 30px 20px;">
      <div style="font-size:60px;">${emoji}</div>
      <div class="big-score" style="color:${color};">${pct}%</div>
      <div class="grade-badge" style="background:${color}20;color:${color};border:2px solid ${color};">${grade}</div>
      <p style="color:var(--muted); margin:8px 0 20px; font-size:13px;">
        ${state.correct} correct · ${state.wrong} wrong · Best streak: ${state.maxStreak}🔥 · Score: ${state.score}pts
      </p>
      ${pct>=70
        ? `<div style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);border-radius:10px;padding:14px;font-size:13px;color:#81C784;max-width:400px;margin:0 auto 20px;">
            🎉 You cleared the 70% threshold — you're ready for PDF 2!
           </div>`
        : `<div style="background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);border-radius:10px;padding:14px;font-size:13px;color:#EF9A9A;max-width:400px;margin:0 auto 20px;">
            📚 Below 70% — re-read the weak areas in PDF 1 and try again!
           </div>`
      }
      <div class="results-breakdown">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--accent);margin-bottom:8px;">📊 BREAKDOWN BY TOPIC</div>
        ${getTopicBreakdown()}
      </div>
      <div class="nav-row" style="justify-content:center;">
        <button class="nav-btn" onclick="reviewWrong()">🔍 Review Wrong Answers</button>
        <button class="nav-btn primary" onclick="resetTest();renderQuestion()">🔄 Retake Test</button>
      </div>
    </div>
  `;
}

function getTopicBreakdown() {
  const topics = {};
  state.questions.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = {total:0, correct:0};
    topics[q.topic].total++;
    if (state.answered[q.id]?.isCorrect) topics[q.topic].correct++;
  });
  return Object.entries(topics).map(([t,v]) => {
    const pct = v.total > 0 ? Math.round((v.correct/v.total)*100) : 0;
    const col = pct>=70?'#4CAF50':pct>=50?'#FF9800':'#EF5350';
    return `<div class="breakdown-row">
      <span>${topicIcon(t)} ${t}</span>
      <span style="color:${col};font-weight:700;">${v.correct}/${v.total} (${pct}%)</span>
    </div>`;
  }).join('');
}

function reviewWrong() {
  const wrong = state.questions.filter(q => state.answered[q.id] && !state.answered[q.id].isCorrect);
  if (!wrong.length) { alert('No wrong answers! 🎉'); return; }
  state.questions = wrong;
  state.currentIndex = 0;
  renderQuestion();
}

// ══════════════════════════════════════════════════════
// FLASHCARDS
// ══════════════════════════════════════════════════════
function renderFlashcard() {
  const main = document.getElementById('mainArea');
  const fc = flashcards[state.flashIndex];
  const total = flashcards.length;

  main.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;">
      <span style="font-family:'Syne',sans-serif;font-size:13px;color:var(--muted);">
        Flashcard ${state.flashIndex+1} of ${total} — Click card to reveal!
      </span>
    </div>
    <div class="flashcard" onclick="toggleFlash()" id="fcCard">
      <div class="fc-front">${fc.term}</div>
      <div class="fc-hint" id="fcHint">👆 Click to reveal definition & memory trick</div>
      <div class="fc-back ${state.flashRevealed?'show':''}" id="fcBack">
        <div class="fc-answer">${fc.ans}</div>
        <div class="fc-trick">🎯 ${fc.trick}</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="flashNav(-1)" ${state.flashIndex===0?'disabled':''}>← Prev</button>
      <button class="nav-btn" onclick="flashNav(0)">🔄 Shuffle</button>
      <button class="nav-btn primary" onclick="flashNav(1)">${state.flashIndex>=total-1?'🏁 Done':'Next →'}</button>
    </div>
    <div style="margin-top:16px;">
      <div class="topic-grid">
        ${flashcards.map((f,i)=>`
          <div class="topic-chip ${i===state.flashIndex?'active':''}" onclick="goFlash(${i})">
            <span class="t-icon">📌</span>
            ${f.term.length>15?f.term.substr(0,14)+'…':f.term}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleFlash() {
  state.flashRevealed = !state.flashRevealed;
  document.getElementById('fcBack').classList.toggle('show', state.flashRevealed);
  document.getElementById('fcHint').style.display = state.flashRevealed ? 'none' : 'block';
}

function flashNav(dir) {
  if (dir === 0) {
    // shuffle
    state.flashIndex = Math.floor(Math.random() * flashcards.length);
  } else {
    state.flashIndex = Math.max(0, Math.min(flashcards.length-1, state.flashIndex+dir));
  }
  state.flashRevealed = false;
  renderFlashcard();
}

function goFlash(i) {
  state.flashIndex = i;
  state.flashRevealed = false;
  renderFlashcard();
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
resetTest();
renderQuestion();
</script>
</body>
</html>
