<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bihar District Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400;600;800&family=Noto+Sans:wght@400;600&display=swap');
:root{
  --bg:#0d1b2a;--panel:#162032;--card:#1c2d42;
  --accent:#f5a623;--green:#3ecf72;--red:#e05555;
  --blue:#5ab4ff;--purple:#a78bfa;
  --text:#dce8f5;--muted:#6b849e;--border:#253a52;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* NAV */
.nav{width:100%;background:var(--panel);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:10px 20px;position:sticky;top:0;z-index:100;}
.nav-title{font-family:'Baloo Bhai 2',cursive;font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,#f5a623,#ff9a00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ntabs{display:flex;gap:8px;}
.ntab{padding:7px 20px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Baloo Bhai 2',cursive;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.ntab.on{background:var(--accent);color:#1a0d00;border-color:var(--accent);}
.ntab:not(.on):hover{border-color:var(--accent);color:var(--accent);}

/* PAGES */
.page{display:none;width:100%;max-width:1300px;padding:12px 14px 28px;gap:14px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.page.active{display:flex;}

/* MAP */
.map-wrap{flex:1;min-width:300px;position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.map-wrap svg{display:block;width:100%;height:auto;background:#c8dfe8;}

/* Learn polygons */
.lp{stroke:#fff;stroke-width:0.8;cursor:pointer;transition:filter 0.15s,opacity 0.15s;}
.lp:hover{filter:brightness(1.25);stroke:#fff;stroke-width:1.5;opacity:0.92;}
.lp.sel{stroke:var(--accent);stroke-width:2.5;filter:brightness(1.3);}

/* Quiz polygons */
.qp{fill:rgba(30,50,70,0.0);stroke:rgba(100,150,200,0.25);stroke-width:0.8;cursor:pointer;transition:fill 0.15s;}
.qp:hover{fill:rgba(245,166,35,0.28);stroke:rgba(245,166,35,0.8);stroke-width:1.5;}
.qp.found{fill:rgba(62,207,114,0.55);stroke:#3ecf72;stroke-width:1.5;cursor:default;pointer-events:none;}
.qp.reveal{fill:rgba(245,120,35,0.6);stroke:var(--accent);stroke-width:2;cursor:default;pointer-events:none;}
.qp.wrong{fill:rgba(224,85,85,0.6);}
@keyframes pd{0%,100%{fill:rgba(245,166,35,0.15)}50%{fill:rgba(245,166,35,0.6)}}
.qp.pulse{animation:pd 0.5s ease-in-out 5;}

/* District labels */
.dlbl{font-size:6px;fill:#fff;text-anchor:middle;dominant-baseline:middle;pointer-events:none;font-weight:700;paint-order:stroke;stroke:rgba(0,0,0,0.7);stroke-width:2px;}
.qlbl{font-size:8px;fill:#e8f4ff;text-anchor:middle;dominant-baseline:middle;pointer-events:none;font-weight:800;paint-order:stroke;stroke:#0d1b2a;stroke-width:3px;visibility:hidden;}
.qlbl.vis{visibility:visible;}

/* Quiz gray overlay */
.qgray{fill:#162032;opacity:0.88;}

/* Tooltip */
.tip{position:absolute;background:rgba(6,14,24,0.97);border:1px solid var(--accent);border-radius:7px;padding:5px 12px;font-size:0.8rem;font-weight:700;color:var(--accent);pointer-events:none;white-space:nowrap;display:none;z-index:50;transform:translateX(-50%);top:12px;}

/* SIDEBAR */
.sb{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;}
.ch{text-align:center;padding:20px 10px;color:var(--muted);font-size:0.83rem;line-height:1.7;}

/* Info card */
.iname{font-family:'Baloo Bhai 2',cursive;font-size:1.4rem;font-weight:800;color:var(--accent);line-height:1.2;}
.bgs{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.bg{font-size:0.67rem;padding:2px 9px;border-radius:12px;font-weight:700;}
.bd{background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3);}
.br{background:rgba(90,180,255,0.12);color:var(--blue);border:1px solid rgba(90,180,255,0.25);}
.bc{background:rgba(62,207,114,0.12);color:var(--green);border:1px solid rgba(62,207,114,0.3);}
.st{font-size:0.62rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700;margin:10px 0 5px;}
.ir{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;border-bottom:1px solid var(--border);font-size:0.77rem;}
.ir:last-child{border-bottom:none;}
.ir .k{color:var(--muted);white-space:nowrap;margin-right:8px;}
.ir .v{font-weight:600;text-align:right;line-height:1.3;}
.fb-box{background:var(--bg);border-radius:8px;padding:10px 11px;font-size:0.77rem;line-height:1.65;margin-top:5px;}
.bn{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--muted);font-size:0.71rem;}

/* Quiz sidebar */
.sr{display:flex;gap:5px;}
.si{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:7px 3px;border:1px solid var(--border);}
.sv{font-family:'Baloo Bhai 2',cursive;font-size:1.8rem;font-weight:800;line-height:1.1;}
.sl{font-size:0.59rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.sc .sv{color:var(--green);} .sw .sv{color:var(--red);} .sr2 .sv{color:var(--blue);}
.pb-w{background:var(--border);height:5px;border-radius:3px;margin-top:8px;overflow:hidden;}
.pb-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width 0.4s;}
.ql{font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:5px;}
.qn{font-family:'Baloo Bhai 2',cursive;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1.2;}
.qbg{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.fb{padding:9px 12px;border-radius:8px;font-size:0.79rem;font-weight:600;min-height:40px;display:flex;align-items:center;gap:6px;line-height:1.4;}
.fn{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.fok{background:rgba(62,207,114,0.12);color:var(--green);border:1px solid rgba(62,207,114,0.3);}
.ferr{background:rgba(224,85,85,0.12);color:var(--red);border:1px solid rgba(224,85,85,0.3);}
.finf{background:rgba(90,180,255,0.1);color:var(--blue);border:1px solid rgba(90,180,255,0.25);}
.btn{width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:'Baloo Bhai 2',cursive;font-size:0.92rem;font-weight:700;transition:all 0.2s;}
.ba{background:linear-gradient(135deg,#f5a623,#e8950f);color:#1a0d00;}
.ba:hover{filter:brightness(1.1);transform:translateY(-1px);}
.bm{background:var(--border);color:var(--text);margin-top:5px;}
.bm:hover{background:#2d4560;}
.ts-row{display:flex;gap:4px;margin-bottom:9px;}
.ts{flex:1;padding:5px 3px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:0.67rem;font-weight:700;cursor:pointer;text-align:center;transition:all 0.2s;}
.ts.on{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,0.1);}
.dts{display:flex;flex-wrap:wrap;gap:3px;max-height:180px;overflow-y:auto;}
.dts::-webkit-scrollbar{width:3px;}
.dts::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.dt{font-size:0.62rem;padding:2px 7px;border-radius:12px;background:var(--bg);border:1px solid var(--border);color:var(--muted);white-space:nowrap;cursor:pointer;transition:all 0.15s;}
.dt:hover{border-color:var(--accent);color:var(--accent);}
.dt.active{background:rgba(245,166,35,0.15);color:var(--accent);border-color:var(--accent);font-weight:700;}
.dt.found{background:rgba(62,207,114,0.12);color:var(--green);border-color:rgba(62,207,114,0.4);}
.dt.missed{background:rgba(224,85,85,0.1);color:var(--red);border-color:rgba(224,85,85,0.3);text-decoration:line-through;}

/* Game Over */
.go-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;align-items:center;justify-content:center;}
.go-ov.show{display:flex;}
.go-c{background:var(--card);border:2px solid var(--accent);border-radius:20px;padding:30px 34px;text-align:center;max-width:330px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,0.7);}
.go-e{font-size:2.8rem;margin-bottom:5px;}
.go-c h2{font-family:'Baloo Bhai 2',cursive;font-size:1.7rem;color:var(--accent);}
.go-s{font-family:'Baloo Bhai 2',cursive;font-size:3.5rem;font-weight:800;line-height:1;margin:8px 0;}
.go-g{display:inline-block;padding:3px 16px;border-radius:20px;font-size:0.85rem;font-weight:700;margin-bottom:12px;}
.gs{background:rgba(62,207,114,0.2);color:var(--green);border:1px solid var(--green);}
.ga{background:rgba(245,166,35,0.2);color:var(--accent);border:1px solid var(--accent);}
.gb{background:rgba(90,180,255,0.2);color:var(--blue);border:1px solid var(--blue);}
.gc{background:rgba(224,85,85,0.2);color:var(--red);border:1px solid var(--red);}
.go-m{color:var(--muted);font-size:0.84rem;margin-bottom:14px;}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">🗺️ Bihar District Explorer</span>
  <div class="ntabs">
    <button class="ntab on" id="btn-learn">📚 Learn</button>
    <button class="ntab" id="btn-quiz">🎯 Quiz</button>
  </div>
</nav>

<!-- LEARN PAGE -->
<div id="pg-learn" class="page active">
  <div class="map-wrap" id="lmap">
    <svg id="lsvg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="tip" id="ltip"></div>
  </div>
  <div class="sb">
    <div class="card" id="icard">
      <div class="ch">
        <div style="font-size:2.4rem">👆</div><br>
        <strong>Click any district</strong> on the map<br>to see details &amp; BPSC exam facts
      </div>
    </div>
    <div class="card">
      <div class="st">All 38 Districts</div>
      <div class="dts" id="ltags"></div>
    </div>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="pg-quiz" class="page">
  <div class="map-wrap" id="qmap">
    <svg id="qsvg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="tip" id="qtip"></div>
  </div>
  <div class="sb">
    <div class="card">
      <div class="ts-row">
        <div class="ts on" id="qt-all">All 38</div>
        <div class="ts" id="qt-north">North Bihar</div>
        <div class="ts" id="qt-south">South Bihar</div>
      </div>
      <div class="sr">
        <div class="si sc"><div class="sv" id="qsc">0</div><div class="sl">✓ Done</div></div>
        <div class="si sw"><div class="sv" id="qsw">0</div><div class="sl">✗ Miss</div></div>
        <div class="si sr2"><div class="sv" id="qsr">38</div><div class="sl">Left</div></div>
      </div>
      <div class="pb-w"><div class="pb-f" id="qpb" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="ql">📍 Find this district:</div>
      <div class="qn" id="qname">—</div>
      <div class="qbg" id="qbadges"></div>
    </div>
    <div class="card">
      <div class="fb fn" id="qfb">Press Start to begin!</div>
    </div>
    <button class="btn ba" id="qsbtn">🚀 Start Quiz</button>
    <button class="btn bm" id="skipbtn">⏭ Skip this one</button>
    <div class="card">
      <div class="ql">Progress</div>
      <div class="dts" id="qtags"></div>
    </div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="go-ov" id="goOv">
  <div class="go-c">
    <div class="go-e" id="goEm">🎉</div>
    <h2 id="goTi">Quiz Complete!</h2>
    <div class="go-s" id="goSc">0/38</div>
    <div class="go-g ga" id="goGr">Grade</div>
    <div class="go-m" id="goMs">Keep practicing!</div>
    <button class="btn ba" id="btn-again" style="margin-bottom:6px">🔄 Play Again</button>
    <button class="btn bm" id="btn-close-go">📊 View Map</button>
  </div>
</div>

// Centroid calculator
function cen(poly){
  var pts=poly.trim().split(' ').map(function(s){var a=s.split(',');return[+a[0],+a[1]];});
  return[pts.reduce(function(s,a){return s+a[0];},0)/pts.length,
         pts.reduce(function(s,a){return s+a[1];},0)/pts.length];
}

  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});

}

var lSel=null;
(function(){
  var svg=document.getElementById('lsvg');
  // Background rect
  var bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x','0');bg.setAttribute('y','0');
  bg.setAttribute('width','1000');bg.setAttribute('height','700');
  bg.setAttribute('fill','#c8dfe8');
  svg.appendChild(bg);

  Object.keys(D).forEach(function(id){
    var d=D[id], c=cen(d.p);
    var poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',d.p);
    poly.setAttribute('class','lp');
    poly.setAttribute('fill',d.dc);
    poly.setAttribute('id','lp-'+id);

    var lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',c[0]);lbl.setAttribute('y',c[1]);
    lbl.setAttribute('class','dlbl');
    var sn=d.name.replace('West ','W.').replace('East ','E.').replace(' Champaran',' Ch.');
    lbl.textContent=sn;

    poly.addEventListener('mousemove',function(e){
      var t=document.getElementById('ltip'),r=document.getElementById('lmap').getBoundingClientRect();
      t.style.display='block';t.style.left=(e.clientX-r.left)+'px';t.style.top='10px';t.textContent=d.name;

    poly.addEventListener('click',function(){selL(id);});
    svg.appendChild(poly);svg.appendChild(lbl);
  });

  Object.keys(D).sort(function(a,b){return D[a].name.localeCompare(D[b].name);}).forEach(function(id){
    var t=document.createElement('span');t.className='dt';t.textContent=D[id].name;
    t.addEventListener('click',function(){selL(id);});
    el.appendChild(t);
  });
})();

function selL(id){
  if(lSel){var p=document.getElementById('lp-'+lSel);if(p)p.classList.remove('sel');}
  lSel=id;
  var el=document.getElementById('lp-'+id);if(el)el.classList.add('sel');
  var d=D[id];
  var cap=d.hq.indexOf('Capital')>=0?'<span class="bg bc">🏛 Capital</span>':'';
  document.getElementById('icard').innerHTML=
    '<div class="iname">'+d.name+'</div>'+
    '<div class="bgs"><span class="bg bd">'+d.div+' Division</span>'+
    '<span class="bg br">'+(d.reg==='north'?'🔵 North Bihar':'🟤 South Bihar')+'</span>'+cap+'</div>'+

var qMode='all',qQ=[],qCur=null,qC=0,qW=0,qAct=false,qAns=false,qBuilt=false;

function buildQMap(){
  if(qBuilt)return;qBuilt=true;
  var svg=document.getElementById('qsvg');

  // Dark background
  var bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x','0');bg.setAttribute('y','0');
  bg.setAttribute('width','1000');bg.setAttribute('height','700');
  bg.setAttribute('fill','#162032');
  svg.appendChild(bg);

  // Draw subtle district outlines (so shape is hinted)
  Object.keys(D).forEach(function(id){
    var d=D[id];
    var outline=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    outline.setAttribute('points',d.p);
    outline.setAttribute('fill','#1e3248');
    outline.setAttribute('stroke','#2d4d6a');
    outline.setAttribute('stroke-width','0.8');
    outline.setAttribute('id','qo-'+id);
    svg.appendChild(outline);
  });

  // Clickable hit polygons + labels on top
  Object.keys(D).forEach(function(id){
    var d=D[id],c=cen(d.p);
    var poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',d.p);
    poly.setAttribute('class','qp');
    poly.setAttribute('id','qp-'+id);

    var lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',c[0]);lbl.setAttribute('y',c[1]);
    lbl.setAttribute('class','qlbl');lbl.setAttribute('visibility','hidden');
    lbl.setAttribute('id','ql-'+id);
    lbl.textContent=d.name;

    poly.addEventListener('mousemove',function(e){
      if(!qAct)return;
      var t=document.getElementById('qtip'),r=document.getElementById('qmap').getBoundingClientRect();
      t.style.display='block';t.style.left=(e.clientX-r.left)+'px';t.style.top='10px';t.textContent='?';
    });
    poly.addEventListener('mouseleave',function(){document.getElementById('qtip').style.display='none';});
    poly.addEventListener('click',function(){hQ(id);});
    svg.appendChild(poly);svg.appendChild(lbl);
  });

  buildQTags(Object.keys(D));
}

function gL(){
  if(qMode==='all')return Object.keys(D);
  return Object.keys(D).filter(function(id){return D[id].reg===qMode;});
}

}
function buildQTags(list){
  var el=document.getElementById('qtags');el.innerHTML='';
  list.sort(function(a,b){return D[a].name.localeCompare(D[b].name);}).forEach(function(id){
    var t=document.createElement('span');t.className='dt';t.id='qtag-'+id;t.textContent=D[id].name;
    el.appendChild(t);
  });
}
function startQ(){
  var list=gL();qQ=shuf(list.slice());qC=0;qW=0;qAct=true;qAns=false;
  Object.keys(D).forEach(function(id){
    var p=document.getElementById('qp-'+id);if(p)p.className.baseVal='qp';
    var o=document.getElementById('qo-'+id);if(o){o.setAttribute('fill','#1e3248');o.setAttribute('stroke','#2d4d6a');}
    var l=document.getElementById('ql-'+id);if(l){l.className.baseVal='qlbl';l.setAttribute('visibility','hidden');}
  });
  buildQTags(list);
  document.getElementById('qsbtn').textContent='🔄 Restart';
  updQ(list.length);nxtQ();
}
function nxtQ(){
  if(qQ.length===0){endQ();return;}qAns=false;qCur=qQ.shift();
  var d=D[qCur];
  document.getElementById('qname').textContent=d.name;
  document.getElementById('qbadges').innerHTML=
    '<span class="bg bd">'+d.div+'</span>'+
    '<span class="bg br">'+(d.reg==='north'?'🔵 North':'🟤 South')+'</span>';
  setFb('n','Click <b>'+d.name+'</b> on the map!');
  document.querySelectorAll('.dt.active').forEach(function(t){t.classList.remove('active');});
  var tag=document.getElementById('qtag-'+qCur);
  if(tag){tag.className='dt active';tag.scrollIntoView({block:'nearest'});}
  updQ();
}
function hQ(id){
  if(!qAct||qAns)return;qAns=true;
  var p=document.getElementById('qp-'+id);
  var o=document.getElementById('qo-'+id);
  if(id===qCur){
    qC++;
    p.className.baseVal='qp found';
    if(o){o.setAttribute('fill',D[id].dc);o.setAttribute('stroke','#fff');}
    var l=document.getElementById('ql-'+id);if(l){l.className.baseVal='qlbl vis';l.setAttribute('visibility','visible');}
    setFb('ok','✅ Correct! <b>'+D[qCur].name+'</b> — '+D[qCur].div+' Division');
    var tag=document.getElementById('qtag-'+qCur);if(tag)tag.className='dt found';
    updQ();setTimeout(nxtQ,1000);
  } else {
    qW++;
    p.classList.add('wrong');
    setTimeout(function(){if(p)p.className.baseVal='qp';},500);
    setFb('err','❌ That is <b>'+(D[id]?D[id].name:'?')+'</b>. Find <b>'+D[qCur].name+'</b>!');
    updQ();
    setTimeout(function(){
      var cp=document.getElementById('qp-'+qCur);
      var co=document.getElementById('qo-'+qCur);
      if(cp){
        cp.classList.add('pulse');
        setTimeout(function(){
          if(cp)cp.className.baseVal='qp reveal';
          if(co){co.setAttribute('fill','#c0392b');co.setAttribute('stroke','#fff');}
        },2500);
      }
      var tag2=document.getElementById('qtag-'+qCur);if(tag2)tag2.className='dt missed';
      setTimeout(nxtQ,1600);
    },1800);
  }
}
function skipD(){
  if(!qAct||!qCur)return;qW++;
  var cp=document.getElementById('qp-'+qCur);if(cp)cp.className.baseVal='qp reveal';
  var co=document.getElementById('qo-'+qCur);
  if(co){co.setAttribute('fill','#c0392b');co.setAttribute('stroke','#fff');}
  var l=document.getElementById('ql-'+qCur);if(l){l.className.baseVal='qlbl vis';l.setAttribute('visibility','visible');}
  var tag=document.getElementById('qtag-'+qCur);if(tag)tag.className='dt missed';
  setFb('inf','⏭ Skipped: <b>'+D[qCur].name+'</b>');
  updQ();qAns=true;setTimeout(nxtQ,500);
}
function setFb(t,h){
  var el=document.getElementById('qfb');
  el.className='fb '+(t==='ok'?'fok':t==='err'?'ferr':t==='inf'?'finf':'fn');
  el.innerHTML=h;
}
function updQ(lo){
  var list=gL(),done=qC+qW,left=lo!==undefined?lo:Math.max(0,list.length-done);
  document.getElementById('qsc').textContent=qC;
  document.getElementById('qsw').textContent=qW;
  document.getElementById('qsr').textContent=left;
  document.getElementById('qpb').style.width=(done/list.length*100)+'%';
}
function endQ(){
  qAct=false;
  var total=qC+qW,pct=total>0?Math.round(qC/total*100):0;
  var em,ti,gr,gc,ms;
  if(pct>=95){em='🏆';ti='BPSC Topper!';gr='S Rank 🌟';gc='gs';ms='Exceptional! Bihar ka geography king!';}
  else if(pct>=80){em='🎯';ti='Excellent!';gr='A Grade';gc='ga';ms='Strong! BPSC ready!';}
  else if(pct>=60){em='📚';ti='Good Job!';gr='B Grade';gc='gb';ms='Decent — revise missed districts.';}
  else{em='💪';ti='Keep Going!';gr='C Grade';gc='gc';ms='Repeat karo, improvement hoga!';}
  document.getElementById('goEm').textContent=em;
  document.getElementById('goTi').textContent=ti;
  document.getElementById('goSc').innerHTML='<span style="color:var(--green)">'+qC+'</span>/<span style="color:var(--muted)">'+total+'</span>';
  document.getElementById('goGr').textContent=gr;
  document.getElementById('goGr').className='go-g '+gc;
  document.getElementById('goMs').textContent=ms;
  document.getElementById('goOv').classList.add('show');
}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
</script>
</body>
</html>
